pipeline:

  name: Enterprise Revenue Intelligence Platform

  version: 2.1

  environment: development

  stages:

    - warehouse

  execution:

    batch_size: 10000

    max_retries: 3

    retry_delay_seconds: 5

    continue_on_failure: false

  warehouse:

    build_views: true

    build_constraints: true

    run_quality_checks: true

    generate_summary: true

  semantic:

    build_views: true

    build_constraints: true

    run_quality_checks: true

    generate_summary: true  